<div class="max-w-4xl mx-auto my-16 px-6">
  <h2 class="text-3xl font-bold text-green-900 mb-8 text-center">Questions fréquentes</h2>

  <div *ngFor="let item of items; let i = index" class="mb-4">
    <!-- Bandeau question -->
    <button (click)="toggle(i)" class="w-full flex justify-between items-center px-6 py-4 rounded-xl shadow-md transition" [ngClass]="colors[i % colors.length]">
      <span class="font-medium text-lg text-green-900">{{ item.question }}</span>
      <svg class="w-5 h-5 transform transition-transform duration-300" [class.rotate-180]="activeQuestion === i" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    <!-- Réponse -->
    <div *ngIf="activeQuestion === i" class="mt-2 px-6 py-4 bg-white rounded-lg shadow-inner border-l-4 border-green-400 text-gray-700">
      {{ item.answer }}
    </div>
  </div>
</div>
